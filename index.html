<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Global CBAM Strategic Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; padding: 20px; line-height: 1.6; }
        .wrapper { max-width: 700px; margin: auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 12px 40px rgba(0,0,0,0.15); border-top: 10px solid #003366; }
        .section-title { color: #003366; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        
        .toggle-container { background: #eef2f7; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border: 1px solid #d1d9e6; }
        .switch { position: relative; width: 60px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #27ae60; }
        input:checked + .slider:before { transform: translateX(30px); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 0.9em; color: #444; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; box-sizing: border-box; transition: border 0.3s; }
        select:focus, input:focus { border-color: #003366; outline: none; }

        button { width: 100%; padding: 18px; background: #003366; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2em; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #002244; transform: translateY(-2px); }

        .res-area { margin-top: 30px; padding: 25px; border-radius: 12px; display: none; border: 2px solid #003366; }
        .math-log { text-align: left; font-family: 'Courier New', monospace; font-size: 0.85em; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #eee; color: #333; }
        .big-val { font-size: 2.8em; font-weight: bold; margin: 15px 0; }
        .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.8em; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2 class="section-title">Strategic CBAM Planner (2026-2034)</h2>

    <div class="toggle-container">
        <span id="modeText" style="font-size: 1em;">Reporting Mode: <strong>INDIA DEFAULT (Annex 2026)</strong></span>
        <label class="switch">
            <input type="checkbox" id="vToggle" onchange="toggleUI()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="grid">
        <div class="group">
            <label>Reporting Year (Phase-out Schedule)</label>
            <select id="year">
                <option value="0.975">2026 (97.5% Discount)</option>
                <option value="0.950">2027 (95.0% Discount)</option>
                <option value="0.900">2028 (90.0% Discount)</option>
                <option value="0.775">2029 (77.5% Discount)</option>
                <option value="0.515">2030 (51.5% Discount)</option>
                <option value="0.390">2031 (39.0% Discount)</option>
                <option value="0.265">2032 (26.5% Discount)</option>
                <option value="0.140">2033 (14.0% Discount)</option>
                <option value="0.000">2034 (No Discount)</option>
            </select>
        </div>
        <div class="group">
            <label>Origin Country</label>
            <select id="country">
                <option value="india">India (Official Annex)</option>
                <option value="china">China</option>
                <option value="turkey">Turkey</option>
            </select>
        </div>
    </div>

    <div class="group" style="margin-bottom:20px;">
        <label>Product Selection (CN Code)</label>
        <select id="product">
            <option value="1.361" data-in="1.859" data-ch="2.15" data-tr="1.95">HC Ferro Manganese (7202 11)</option>
            <option value="1.361" data-in="6.149" data-ch="6.45" data-tr="6.20">Refined Ferro Manganese (7202 19)</option>
            <option value="1.142" data-in="2.585" data-ch="2.95" data-tr="2.75">HC Ferro Chrome (7202 41)</option>
            <option value="1.550" data-in="5.100" data-ch="4.50" data-tr="3.80">Ferro Silicon (7202 21)</option>
            <option value="1.420" data-in="2.046" data-ch="1.92" data-tr="1.88">HC Silico Manganese (7202 30)</option>
        </select>
    </div>

    <div id="vInput" style="display:none;" class="group">
        <label>Your Verified Scope 1 Intensity (tCO2e/t)</label>
        <input type="number" id="actual" value="0.940" step="0.001">
    </div>

    <div class="grid">
        <div class="group">
            <label>EUA Price (€/t)</label>
            <input type="number" id="price" value="80">
        </div>
        <div class="group">
            <label>Import Tonnage</label>
            <input type="number" id="qty" value="1000">
        </div>
    </div>

    <button onclick="calculate()">Calculate Financial Position</button>

    <div id="res" class="res-area">
        <div id="badgeArea"></div>
        <div id="finalVal" class="big-val"></div>
        <div style="font-weight:bold; color:#555; margin-bottom:10px;" id="perTon"></div>
        <div class="math-log" id="log"></div>
    </div>
</div>

<script>
    function toggleUI() {
        const v = document.getElementById('vToggle').checked;
        const text = document.getElementById('modeText');
        text.innerHTML = v ? "Reporting Mode: <strong>VERIFIED DATA</strong>" : "Reporting Mode: <strong>INDIA DEFAULT (Annex 2026)</strong>";
        document.getElementById('vInput').style.display = v ? "block" : "none";
    }

    function calculate() {
        const prodSelect = document.getElementById('product');
        const bench = parseFloat(prodSelect.value);
        const country = document.getElementById('country').value;
        const price = parseFloat(document.getElementById('price').value);
        const qty = parseFloat(document.getElementById('qty').value);
        const factor = parseFloat(document.getElementById('year').value);
        const yearLabel = document.getElementById('year').options[document.getElementById('year').selectedIndex].text.substring(0,4);
        const isV = document.getElementById('vToggle').checked;
        
        let intensity;
        if (isV) {
            intensity = parseFloat(document.getElementById('actual').value);
        } else {
            if (country === "india") intensity = parseFloat(prodSelect.options[prodSelect.selectedIndex].getAttribute('data-in'));
            if (country === "china") intensity = parseFloat(prodSelect.options[prodSelect.selectedIndex].getAttribute('data-ch'));
            if (country === "turkey") intensity = parseFloat(prodSelect.options[prodSelect.selectedIndex].getAttribute('data-tr'));
        }

        const adjBench = bench * factor;
        const delta = intensity - adjBench;
        const perTon = delta * price;
        const total = perTon * qty;

        const box = document.getElementById('res');
        box.style.display = 'block';
        box.style.backgroundColor = total < 0 ? "#e6ffed" : "#fff1f0";
        box.style.borderColor = total < 0 ? "#27ae60" : "#e74c3c";
        
        document.getElementById('badgeArea').innerHTML = total < 0 ? 
            '<span class="badge" style="background:#27ae60; color:white;">Surplus Advantage</span>' : 
            '<span class="badge" style="background:#e74c3c; color:white;">Tax Liability Due</span>';
        
        document.getElementById('finalVal').innerText = "€" + total.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('finalVal').style.color = total < 0 ? "#27ae60" : "#c0392b";
        document.getElementById('perTon').innerText = "Financial Impact per Ton: €" + perTon.toFixed(2);

        document.getElementById('log').innerHTML = 
            "<strong>Calculation Reference (" + yearLabel + "):</strong><br>" +
            "1. EU Adjusted Standard: " + bench + " x " + factor.toFixed(3) + " = " + adjBench.toFixed(3) + "<br>" +
            "2. Emission Gap: " + intensity.toFixed(3) + " - " + adjBench.toFixed(3) + " = " + delta.toFixed(3) + "<br>" +
            "3. Result: " + delta.toFixed(3) + " x €" + price + " x " + qty + " tons";
    }
</script>

</body>
</html>
